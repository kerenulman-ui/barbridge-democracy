<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarBridge - השוואת לשכות עורכי דין בעולם</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--primary);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            text-align: center;
            border-bottom: 4px solid var(--secondary);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-box {
            margin: 20px 0;
            text-align: center;
        }

        input {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .countries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--secondary);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 { color: var(--secondary); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .info-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.95rem; }
        .label { font-weight: bold; color: #64748b; }

        footer { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
